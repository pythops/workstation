- name: Install packages
  community.general.pacman:
    name: "{{ item }}"
    state: latest
  loop:
    - zsh
    - zoxide
  become: true

- name: Create ~/.zsh directory
  ansible.builtin.file:
    path: ~/.zsh
    state: directory
    mode: "0755"

- name: Copy zshrc
  ansible.builtin.copy:
    src: zsh/zshrc
    dest: ~/.zshrc
    mode: "0644"

- name: Install zsh-syntax-highlighting plugin # noqa latest[git]
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: ~/.zsh/zsh-syntax-highlighting

- name: Install zsh-autosuggestions plugin # noqa latest[git]
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    dest: ~/.zsh/zsh-autosuggestions

- name: Install zsh-completions plugin # noqa latest[git]
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-completions
    dest: ~/.zsh/zsh-completions

- name: Install git-fuzzy plugin # noqa latest[git]
  ansible.builtin.git:
    repo: https://github.com/bigH/git-fuzzy.git
    dest: ~/.zsh/git-fuzzy

- name: Install fzf-tab plugin # noqa latest[git]
  ansible.builtin.git:
    repo: https://github.com/Aloxaf/fzf-tab
    dest: ~/.zsh/fzf-tab
